spring.application.name=foresight-api

# --- AUTOMAÇÃO DOCKER COMPOSE (USO LOCAL NA IDE) ---
# O Spring Boot é inteligente: se ele perceber que já está rodando
# dentro do Docker, ele ignora essa automação para não gerar loop.
spring.docker-compose.enabled=true
spring.docker-compose.lifecycle-management=start-only

# --- CONEXÃO COM O BANCO DE DADOS (HÍBRIDO) ---
# Se o Docker enviar as credenciais, ele usa. Se não, usa o localhost padrão.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foresight_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- CONFIGURAÇÕES DO JPA / HIBERNATE ---
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Definido como 'validate' porque quem cria as tabelas agora é o Flyway
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

# --- CONFIGURAÇÃO DO FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- SEGURANÇA E JWT ---
api.security.token.secret=${JWT_SECRET:minha-senha-secreta-do-trabalho-faculdade-123456}

# --- DOCUMENTAÇÃO OPENAPI (SWAGGER) ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- LOGGING ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.br.com.foresight=INFO